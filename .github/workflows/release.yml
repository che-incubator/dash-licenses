name: Release

on:
  push:
    branches: [ main ]

jobs:

  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      -
        name: "Checkout"
        uses: actions/checkout@v4
      -
        name: "Use Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      -
        name: "Install dependencies"
        run: npm ci
      -
        name: "Build"
        run: npm run build
      -
        name: "Run tests"
        run: npm run test:unit
